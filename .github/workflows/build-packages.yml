name: build-packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  linux-deb:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=1.0.0" >> "$GITHUB_ENV"
          fi

      - name: Build Debian package
        shell: bash
        run: |
          chmod +x scripts/build_linux_deb.sh
          scripts/build_linux_deb.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb

  windows-exe:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            "APP_VERSION=$($env:GITHUB_REF_NAME -replace '^v', '')" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            "APP_VERSION=1.0.0" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Build Windows executable
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/build_windows_exe.ps1 -Version $env:APP_VERSION

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            dist\ZenithBrowser_windows_*.zip
            dist\ZenithBrowser\ZenithBrowser.exe

  macos-app:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=1.0.0" >> "$GITHUB_ENV"
          fi

      - name: Build macOS app
        shell: bash
        run: |
          chmod +x scripts/build_macos_app.sh
          scripts/build_macos_app.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: |
            dist/ZenithBrowser_macos_*.zip
            dist/ZenithBrowser_macos_*.dmg
            dist/Zenith Browser/Zenith Browser.app
